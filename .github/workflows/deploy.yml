name: Deploy Laravel Backend to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deployment Progress
    runs-on: ubuntu-latest
    steps:
    - name: 1. 1Mengambil Kode Terbaru
      uses: actions/checkout@v4

    - name: 2. Setup Versi PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, fileinfo

    - name: 3. Install Dependencies (Composer)
      run: composer install --no-dev --optimize-autoloader --no-ansi --no-interaction --no-scripts --prefer-dist

    - name: 4. Bungkus Semua Kodingan (Jadi 1 File)
      run: tar -czf deploy.tar.gz --exclude='.git' --exclude='tests' --exclude='.env' --exclude='deploy.tar.gz' . || true

    - name: 5. Kirim Koper ke cPanel (Via SCP/SSH)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        source: "deploy.tar.gz"
        target: "nourish-backend"

    - name: 6. Buka Koper di Dalam cPanel
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        script: |
          cd nourish-backend
          tar -xzf deploy.tar.gz
          rm deploy.tar.gz